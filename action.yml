name: Publish Alpamayo Intelligence version
description: Publish a component version (and optional SBOM/artifacts) to Alpamayo Intelligence.

inputs:
  api-url:
    description: Base URL of the Alpamayo Intelligence API, for example https://intelligence.example.com.
    required: true
  token:
    description: >-
      Publisher token as <token_key>.<secret>, created with
      `alp admin versioning publisher-token-create`. Sent as a Bearer credential.
    required: true
  project-id:
    description: Project ID that owns the component (used to upload artifact files).
    required: true
  feed:
    description: VersionFeed ID to publish to. The publisher must be allowlisted for it.
    required: true
  version:
    description: Version label to publish.
    required: true
  origin-external-id:
    description: Stable external identity for this version (e.g. the tag or pipeline run id). Defaults to the version label.
    required: false
    default: ''
  source-kind:
    description: Version source kind — git, object, or observed.
    required: false
    default: git
  external-ref:
    description: Source reference that produced the version, such as a tag or branch.
    required: false
    default: ''
  commit-sha:
    description: Resolved immutable commit SHA.
    required: false
    default: ''
  object-key:
    description: Object-storage key for the version's primary content (for source-kind=object).
    required: false
    default: ''
  artifact-kind:
    description: Kind for uploaded artifact files (sbom, signature, scan_report, ...).
    required: false
    default: sbom
  artifact-file:
    description: Local artifact file path to upload and attach.
    required: false
    default: ''
  artifact-files:
    description: Newline-separated local artifact file paths or glob patterns to upload.
    required: false
    default: ''
  artifact-label:
    description: Optional human-readable artifact label.
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Publish version
      shell: bash
      env:
        ALP_API_URL: ${{ inputs.api-url }}
        ALP_TOKEN: ${{ inputs.token }}
        ALP_PROJECT_ID: ${{ inputs.project-id }}
        ALP_FEED: ${{ inputs.feed }}
        ALP_VERSION: ${{ inputs.version }}
        ALP_ORIGIN_EXTERNAL_ID: ${{ inputs.origin-external-id }}
        ALP_SOURCE_KIND: ${{ inputs.source-kind }}
        ALP_EXTERNAL_REF: ${{ inputs.external-ref }}
        ALP_COMMIT_SHA: ${{ inputs.commit-sha }}
        ALP_OBJECT_KEY: ${{ inputs.object-key }}
        ALP_ARTIFACT_KIND: ${{ inputs.artifact-kind }}
        ALP_ARTIFACT_FILE: ${{ inputs.artifact-file }}
        ALP_ARTIFACT_FILES: ${{ inputs.artifact-files }}
        ALP_ARTIFACT_LABEL: ${{ inputs.artifact-label }}
      run: |
        set -euo pipefail
        echo "::add-mask::${ALP_TOKEN}"
        api_url="${ALP_API_URL%/}"

        # 1. Publish the version. The publisher is resolved from the token, not the body.
        payload="$(python3 -c '
        import json, os
        print(json.dumps({
            "feed": os.environ["ALP_FEED"],
            "label": os.environ["ALP_VERSION"],
            "origin_external_id": os.environ.get("ALP_ORIGIN_EXTERNAL_ID") or os.environ["ALP_VERSION"],
            "source_kind": os.environ.get("ALP_SOURCE_KIND", "git"),
            "external_ref": os.environ.get("ALP_EXTERNAL_REF", ""),
            "commit_sha": os.environ.get("ALP_COMMIT_SHA", ""),
            "object_key": os.environ.get("ALP_OBJECT_KEY", ""),
        }))')"
        version_id="$(
          curl -fsS -X POST "${api_url}/api/v1/admin/versioning/publish/" \
            -H "Authorization: Bearer ${ALP_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "${payload}" \
          | python3 -c 'import json, sys; print(json.load(sys.stdin)["id"])'
        )"
        echo "Published version ${ALP_VERSION} (id=${version_id})"

        # 2. Upload artifact files (e.g. SBOMs) and attach them to the version.
        upload_url="${api_url}/api/v1/projects/${ALP_PROJECT_ID}/versions/${version_id}/artifacts/upload/"
        upload_artifact() {
          local artifact_file="$1"
          curl -fsS -X POST "${upload_url}" \
            -H "Authorization: Bearer ${ALP_TOKEN}" \
            -F "kind=${ALP_ARTIFACT_KIND}" \
            -F "label=${ALP_ARTIFACT_LABEL}" \
            -F "file=@${artifact_file}" >/dev/null
          echo "Uploaded ${ALP_ARTIFACT_KIND} artifact ${artifact_file}"
        }

        shopt -s nullglob
        [[ -n "${ALP_ARTIFACT_FILE}" ]] && upload_artifact "${ALP_ARTIFACT_FILE}"
        while IFS= read -r pattern; do
          [[ -n "${pattern}" ]] || continue
          matches=( ${pattern} )
          if [[ "${#matches[@]}" -eq 0 ]]; then
            echo "::warning::No artifact files matched '${pattern}'"
            continue
          fi
          for artifact_file in "${matches[@]}"; do
            upload_artifact "${artifact_file}"
          done
        done <<< "${ALP_ARTIFACT_FILES}"
