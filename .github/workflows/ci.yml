name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate action metadata
        run: ruby -e 'require "yaml"; action = YAML.load_file("action.yml"); abort("not composite") unless action.dig("runs", "using") == "composite"'
